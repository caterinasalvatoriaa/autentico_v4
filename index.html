<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autentico — Ricette del Mondo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#FAF7F2; --terracotta:#C4614A; --terracotta-dark:#9E4A36;
  --gold:#C9A84C; --text:#1A1A1A; --muted:#7A7570; --border:#E5E0D8;
  --serif:'Playfair Display',Georgia,serif; --sans:'DM Sans',sans-serif;
}
html { scroll-behavior:smooth; }
body { font-family:var(--sans); background:var(--bg); color:var(--text); overflow-x:hidden; }

header {
  position:sticky; top:0; z-index:200;
  background:rgba(250,247,242,.94); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 40px; height:64px;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
}
.logo { font-family:var(--serif); font-size:22px; font-weight:600; text-decoration:none; color:var(--text); }
.logo span { color:var(--terracotta); }
.header-right { display:flex; align-items:center; gap:14px; }
.search-wrap { position:relative; }
.search-wrap input {
  border:1.5px solid var(--border); border-radius:24px;
  padding:8px 16px 8px 38px; font-size:14px; font-family:var(--sans);
  background:#fff; outline:none; width:200px; transition:border .2s,width .3s;
}
.search-wrap input:focus { border-color:var(--terracotta); width:260px; }
.search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
.btn-add-hdr {
  background:var(--terracotta); color:#fff; border:none; border-radius:24px;
  padding:9px 18px; font-size:14px; font-weight:500; cursor:pointer;
  font-family:var(--sans); white-space:nowrap; transition:background .2s;
  display:flex; align-items:center; gap:6px;
}
.btn-add-hdr:hover { background:var(--terracotta-dark); }

.hero {
  display:grid; grid-template-columns:1fr 1fr; align-items:center;
  padding:80px; gap:60px; min-height:86vh; position:relative; overflow:hidden;
}
.hero::before {
  content:''; position:absolute; top:-80px; right:-80px;
  width:500px; height:500px; border-radius:50%;
  background:radial-gradient(circle,rgba(196,97,74,.07) 0%,transparent 70%);
  pointer-events:none;
}
.hero-tag {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(196,97,74,.1); color:var(--terracotta);
  border-radius:20px; padding:5px 14px; font-size:12px; font-weight:500;
  text-transform:uppercase; letter-spacing:.5px; margin-bottom:22px;
}
.hero h1 { font-family:var(--serif); font-size:clamp(40px,5vw,66px); font-weight:600; line-height:1.08; letter-spacing:-1px; margin-bottom:18px; }
.hero h1 em { font-style:italic; color:var(--terracotta); }
.hero p { font-size:16px; color:var(--muted); line-height:1.7; margin-bottom:32px; max-width:400px; }
.hero-btns { display:flex; gap:14px; align-items:center; }
.btn-primary {
  background:var(--terracotta); color:#fff; border:none; border-radius:30px;
  padding:14px 28px; font-size:15px; font-weight:500; cursor:pointer;
  font-family:var(--sans); text-decoration:none; transition:background .2s,transform .15s;
  box-shadow:0 4px 20px rgba(196,97,74,.35);
}
.btn-primary:hover { background:var(--terracotta-dark); transform:translateY(-1px); }
.btn-ghost { color:var(--text); font-size:15px; text-decoration:none; display:flex; align-items:center; gap:6px; transition:color .2s; }
.btn-ghost:hover { color:var(--terracotta); }
.hero-stats { display:flex; gap:36px; margin-top:44px; padding-top:32px; border-top:1px solid var(--border); }
.stat-n { font-family:var(--serif); font-size:28px; font-weight:600; }
.stat-l { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
.hero-imgs { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:12px; height:500px; }
.h-img { border-radius:18px; overflow:hidden; position:relative; }
.h-img img { width:100%; height:100%; object-fit:cover; transition:transform .5s; }
.h-img:hover img { transform:scale(1.05); }
.h-img:first-child { grid-row:span 2; }
.h-img-ov { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top,rgba(0,0,0,.6),transparent 60%); padding:14px; color:#fff; }
.h-img-ov strong { font-family:var(--serif); font-size:15px; }
.h-img-ov small { display:block; font-size:10px; opacity:.7; text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

.section { padding:48px 80px; }
.section-title { font-family:var(--serif); font-size:30px; margin-bottom:20px; }
.filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:32px; }
.f-btn {
  border:1.5px solid var(--border); border-radius:24px; padding:7px 18px;
  font-size:14px; background:#fff; cursor:pointer; font-family:var(--sans);
  transition:all .2s; color:var(--text);
}
.f-btn:hover { border-color:var(--terracotta); color:var(--terracotta); }
.f-btn.active { background:var(--text); color:#fff; border-color:var(--text); }
.recipes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:24px; }
.no-results { grid-column:1/-1; text-align:center; padding:60px; color:var(--muted); font-size:16px; }

.rcard {
  background:#fff; border-radius:20px; overflow:hidden;
  box-shadow:0 2px 16px rgba(0,0,0,.06); cursor:pointer;
  transition:transform .25s,box-shadow .25s; display:block; text-decoration:none; color:inherit;
}
.rcard:hover { transform:translateY(-4px); box-shadow:0 12px 36px rgba(0,0,0,.12); }
.rcard-img { position:relative; height:210px; overflow:hidden; }
.rcard-img img { width:100%; height:100%; object-fit:cover; transition:transform .5s; }
.rcard:hover .rcard-img img { transform:scale(1.06); }
.rcard-badges { position:absolute; top:10px; left:10px; display:flex; gap:6px; }
.badge { border-radius:20px; padding:4px 10px; font-size:11px; font-weight:500; display:flex; align-items:center; gap:3px; }
.badge-v { background:rgba(201,168,76,.88); color:#fff; }
.badge-t { background:rgba(0,0,0,.52); color:#fff; backdrop-filter:blur(4px); }
.rcard-body { padding:16px 18px 18px; }
.rcard-author { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.rcard-avatar { width:28px; height:28px; border-radius:50%; background:var(--terracotta); display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:600; flex-shrink:0; }
.rcard-author-n { font-size:13px; font-weight:500; }
.rcard-author-r { font-size:11px; color:var(--muted); }
.rcard-title { font-family:var(--serif); font-size:19px; font-weight:600; margin-bottom:5px; line-height:1.2; }
.rcard-desc { font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:12px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.rcard-footer { display:flex; align-items:center; justify-content:space-between; }
.rcard-likes { display:flex; align-items:center; gap:5px; font-size:13px; color:var(--muted); }
.rcard-likes svg { color:var(--terracotta); }
.btn-cook { background:var(--terracotta); color:#fff; border:none; border-radius:20px; padding:6px 15px; font-size:13px; font-weight:500; cursor:pointer; font-family:var(--sans); transition:background .2s; }
.btn-cook:hover { background:var(--terracotta-dark); }

/* DETAIL MODAL */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:300; overflow-y:auto; }
.overlay.open { display:flex; justify-content:center; padding:40px 20px; }
.modal { background:var(--bg); width:100%; max-width:740px; border-radius:28px; overflow:hidden; align-self:flex-start; animation:slideUp .3s ease; position:relative; }
@keyframes slideUp { from{transform:translateY(28px);opacity:0} to{transform:none;opacity:1} }
.modal-close-btn {
  position:absolute; top:14px; right:14px; z-index:10;
  background:rgba(255,255,255,.25); backdrop-filter:blur(8px);
  border:none; color:#fff; width:38px; height:38px; border-radius:50%;
  font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.modal-hero-img { position:relative; height:320px; }
.modal-hero-img img { width:100%; height:100%; object-fit:cover; }
.modal-hero-ov { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.7),transparent 50%); }
.modal-hero-txt { position:absolute; bottom:22px; left:26px; right:26px; color:#fff; }
.modal-hero-txt h2 { font-family:var(--serif); font-size:34px; font-weight:600; line-height:1.1; margin-bottom:5px; }
.modal-hero-txt .region { font-size:12px; text-transform:uppercase; letter-spacing:2px; opacity:.8; }
.modal-body { padding:28px 28px 44px; }
.modal-st { font-family:var(--serif); font-size:21px; margin:24px 0 14px; }
.ing-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.ing-row:last-child { border-bottom:none; }
.ing-row.ck .ing-name { text-decoration:line-through; opacity:.4; }
.ing-chk { width:20px; height:20px; border-radius:50%; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; }
.ing-chk.on { background:var(--terracotta); border-color:var(--terracotta); }
.ing-name { flex:1; font-size:15px; }
.ing-qty { font-size:13px; color:var(--muted); }
.auth-box { background:#FDF8F0; border-left:3px solid var(--gold); border-radius:0 12px 12px 0; padding:14px 18px; margin:20px 0; }
.auth-box-t { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--gold); font-weight:600; margin-bottom:8px; }
.auth-box ul { list-style:none; display:flex; flex-direction:column; gap:6px; }
.auth-box li { font-size:13px; color:#555; line-height:1.55; padding-left:12px; position:relative; }
.auth-box li::before { content:'·'; position:absolute; left:0; color:var(--gold); font-size:16px; line-height:1; }
.step-row { display:flex; gap:18px; margin-bottom:22px; }
.step-n { font-family:var(--serif); font-size:48px; color:rgba(0,0,0,.07); line-height:1; min-width:52px; flex-shrink:0; }
.step-txt { font-size:15px; line-height:1.65; color:#333; padding-top:4px; }
.step-timer-badge { margin-top:6px; font-size:12px; color:var(--terracotta); display:flex; align-items:center; gap:4px; }
.modal-cta { margin-top:28px; text-align:center; }
.btn-start-cooking {
  background:var(--terracotta); color:#fff; border:none; border-radius:30px;
  padding:15px 36px; font-size:16px; font-weight:500; cursor:pointer; font-family:var(--sans);
  box-shadow:0 4px 20px rgba(196,97,74,.4); transition:background .2s,transform .15s;
}
.btn-start-cooking:hover { background:var(--terracotta-dark); transform:scale(1.02); }

/* COOKING FULLSCREEN */
#cooking-screen {
  display:none; position:fixed; inset:0; z-index:1000;
  background:#111; color:#fff; flex-direction:column; font-family:var(--sans);
}
#cooking-screen.open { display:flex; }
.ck-header { display:flex; justify-content:space-between; align-items:center; padding:18px 24px; border-bottom:1px solid rgba(255,255,255,.1); flex-shrink:0; }
.ck-recipe-title { font-family:var(--serif); font-size:17px; }
.ck-close-btn { background:none; border:none; color:#fff; font-size:24px; cursor:pointer; opacity:.7; transition:opacity .2s; padding:4px 8px; }
.ck-close-btn:hover { opacity:1; }
.ck-progress { display:flex; gap:4px; padding:14px 24px 0; flex-shrink:0; }
.ck-dot { flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,.15); transition:background .3s; }
.ck-dot.done { background:var(--terracotta); }
.ck-step-label { padding:8px 24px 0; font-size:13px; color:rgba(255,255,255,.4); flex-shrink:0; }
.ck-ing-strip { padding:10px 24px; display:flex; gap:8px; overflow-x:auto; flex-shrink:0; }
.ck-ing-strip::-webkit-scrollbar { display:none; }
.ck-ing-pill { background:rgba(255,255,255,.08); border-radius:20px; padding:5px 12px; font-size:12px; white-space:nowrap; color:rgba(255,255,255,.65); }
.ck-main { flex:1; display:flex; flex-direction:column; justify-content:center; padding:16px 24px; overflow:hidden; }
.ck-card { background:rgba(255,255,255,.06); border-radius:24px; padding:32px; max-width:700px; margin:0 auto; width:100%; }
.ck-num { font-family:var(--serif); font-size:64px; color:rgba(255,255,255,.07); margin-bottom:8px; line-height:1; }
.ck-text { font-size:clamp(18px,2.8vw,24px); font-weight:400; line-height:1.45; }
/* timer */
.ck-timer { margin-top:22px; }
.timer-wrap { display:inline-flex; align-items:center; gap:12px; background:rgba(196,97,74,.15); border:1.5px solid rgba(196,97,74,.4); border-radius:16px; padding:12px 20px; }
.timer-val { font-family:var(--serif); font-size:32px; font-weight:600; color:#fff; min-width:90px; }
.timer-ctrl { background:var(--terracotta); color:#fff; border:none; border-radius:10px; width:38px; height:38px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; }
.timer-ctrl:hover { background:var(--terracotta-dark); }
.timer-reset { background:rgba(255,255,255,.15); }
.timer-done-msg { color:var(--gold); font-size:13px; margin-top:8px; display:none; font-weight:500; }
.timer-done-msg.show { display:block; }
.ck-nav { display:flex; gap:12px; padding:16px 24px 24px; flex-shrink:0; }
.ck-nav button { flex:1; padding:15px; border-radius:16px; border:none; font-size:15px; font-weight:500; cursor:pointer; font-family:var(--sans); transition:all .2s; }
.ck-btn-prev { background:rgba(255,255,255,.1); color:#fff; }
.ck-btn-next { background:var(--terracotta); color:#fff; }
.ck-btn-next:hover { background:var(--terracotta-dark); }
.ck-btn-finish { background:#4CAF50; color:#fff; }

/* ADD RECIPE MODAL */
#add-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:400; overflow-y:auto; }
#add-overlay.open { display:flex; justify-content:center; padding:40px 20px; }
.add-modal { background:#fff; width:100%; max-width:680px; border-radius:24px; padding:32px; align-self:flex-start; animation:slideUp .3s ease; position:relative; }
.add-modal h2 { font-family:var(--serif); font-size:26px; margin-bottom:6px; }
.add-modal > p { font-size:14px; color:var(--muted); margin-bottom:24px; }
.form-row { margin-bottom:16px; }
label { display:block; font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:5px; font-weight:500; }
input[type=text], input[type=number], textarea, select {
  width:100%; border:1.5px solid var(--border); border-radius:12px;
  padding:11px 14px; font-size:14px; font-family:var(--sans); outline:none; background:#fff; transition:border .2s;
}
input:focus, textarea:focus, select:focus { border-color:var(--terracotta); }
textarea { resize:vertical; }
.form-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.dyn-list { display:flex; flex-direction:column; gap:8px; margin-bottom:8px; }
.dyn-row { display:flex; gap:8px; align-items:center; }
.dyn-row input { flex:1; }
.dyn-row .rm-btn { background:none; border:1.5px solid var(--border); border-radius:8px; width:34px; height:34px; cursor:pointer; font-size:15px; color:var(--muted); flex-shrink:0; transition:all .2s; }
.dyn-row .rm-btn:hover { border-color:#e55; color:#e55; }
.btn-add-row { background:none; border:1.5px dashed var(--border); border-radius:10px; width:100%; padding:8px; font-size:13px; color:var(--muted); cursor:pointer; font-family:var(--sans); transition:all .2s; margin-bottom:16px; }
.btn-add-row:hover { border-color:var(--terracotta); color:var(--terracotta); }
.step-dyn-row { display:flex; gap:8px; align-items:flex-start; }
.step-num-lbl { min-width:26px; height:26px; background:var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; margin-top:10px; flex-shrink:0; color:var(--text); }
.step-inner { flex:1; display:flex; flex-direction:column; gap:5px; }
.step-timer-row { display:flex; align-items:center; gap:8px; }
.step-timer-row span { font-size:12px; color:var(--muted); white-space:nowrap; }
.step-timer-row input[type=number] { width:120px; flex:none; }
.step-rm { background:none; border:none; cursor:pointer; color:var(--muted); font-size:15px; padding:4px 6px; margin-top:8px; }
.form-actions { display:flex; gap:10px; margin-top:24px; }
.btn-save { flex:1; background:var(--terracotta); color:#fff; border:none; border-radius:14px; padding:14px; font-size:15px; font-weight:500; cursor:pointer; font-family:var(--sans); transition:background .2s; }
.btn-save:hover { background:var(--terracotta-dark); }
.btn-cancel { background:none; border:1.5px solid var(--border); border-radius:14px; padding:14px 20px; font-size:15px; cursor:pointer; font-family:var(--sans); color:var(--muted); transition:all .2s; }
.btn-cancel:hover { border-color:var(--muted); color:var(--text); }

/* AI REVIEW FLOW */
.add-steps-bar { display:flex; align-items:center; margin-bottom:24px; }
.add-step-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); font-weight:500; }
.add-step-item.active { color:var(--terracotta); }
.add-step-item.done { color:#4CAF50; }
.add-step-num { width:22px; height:22px; border-radius:50%; background:var(--border); color:var(--muted); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .3s; }
.add-step-item.active .add-step-num { background:var(--terracotta); color:#fff; }
.add-step-item.done .add-step-num { background:#4CAF50; color:#fff; }
.add-step-sep { flex:1; height:1px; background:var(--border); margin:0 10px; }
.ai-spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--terracotta); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto; }
@keyframes spin { to { transform:rotate(360deg); } }
.review-field { margin-bottom:16px; }
.review-field-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.review-field-header label { margin:0; }
.review-badges { display:flex; gap:5px; align-items:center; }
.badge-ai { display:inline-flex; align-items:center; gap:4px; font-size:11px; border-radius:12px; padding:3px 9px; font-weight:500; cursor:pointer; border:none; font-family:var(--sans); transition:all .2s; }
.badge-ai-changed { background:rgba(196,97,74,.1); color:var(--terracotta); }
.badge-ai-added { background:rgba(76,175,80,.1); color:#2e7d32; }
.badge-ai-accept { background:var(--terracotta); color:#fff; }
.badge-ai-accept:hover { background:var(--terracotta-dark); }
.badge-ai-reject { background:#eee; color:#555; }
.badge-ai-reject:hover { background:#ddd; }
.review-input-wrap { position:relative; }
.review-suggestion {
  background:#FFF8F0; border:1.5px solid rgba(196,97,74,.25); border-radius:10px;
  padding:10px 12px; margin-top:6px; font-size:13px; color:#555; line-height:1.5;
}
.review-suggestion .sug-label { font-size:11px; font-weight:600; color:var(--terracotta); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; display:flex; align-items:center; gap:4px; }
.review-suggestion .sug-text { color:#333; margin-bottom:8px; }
.review-suggestion .sug-actions { display:flex; gap:6px; }
.sug-accept { background:var(--terracotta); color:#fff; border:none; border-radius:8px; padding:5px 12px; font-size:12px; font-weight:500; cursor:pointer; font-family:var(--sans); }
.sug-reject { background:#eee; color:#555; border:none; border-radius:8px; padding:5px 12px; font-size:12px; cursor:pointer; font-family:var(--sans); }
.ai-changes-summary { background:#F0FFF4; border:1.5px solid rgba(76,175,80,.3); border-radius:12px; padding:14px 16px; margin-top:16px; }
.ai-changes-summary .sum-title { font-size:12px; font-weight:600; color:#2e7d32; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.ai-changes-summary li { font-size:13px; color:#444; margin-bottom:4px; margin-left:14px; }
.final-preview-card { background:#fff; border-radius:16px; padding:20px; border:1.5px solid var(--border); }
.final-preview-card h3 { font-family:var(--serif); font-size:22px; margin-bottom:4px; }
.final-preview-tag { display:inline-flex; align-items:center; gap:4px; background:rgba(196,97,74,.1); color:var(--terracotta); border-radius:16px; padding:3px 10px; font-size:12px; margin-right:5px; margin-bottom:8px; }
.final-ing-list { display:flex; flex-direction:column; gap:4px; margin-top:8px; }
.final-ing-item { font-size:13px; color:#555; display:flex; gap:8px; }
.final-ing-item::before { content:'·'; color:var(--terracotta); }
.final-step-item { display:flex; gap:12px; margin-bottom:10px; }
.final-step-n { font-family:var(--serif); font-size:30px; color:rgba(0,0,0,.08); line-height:1; min-width:36px; }

// ── FIREBASE DATABASE ──
async function loadRecipes() {
  recipes = [...DEFAULT_RECIPES];
  renderGrid(); updateStats(); // show defaults immediately
  try {
    if (!window._db) { await waitForFirebase(); }
    const q = window._fsQuery(
      window._fsCollection(window._db, 'recipes'),
      window._fsOrderBy('createdAt', 'desc')
    );
    const snap = await window._fsDocs(q);
    const userRecipes = [];
    snap.forEach(doc => userRecipes.push({ id: doc.id, ...doc.data() }));
    recipes = [...DEFAULT_RECIPES, ...userRecipes];
    renderGrid(); updateStats();
  } catch(e) {
    console.warn('Firebase load failed, using defaults:', e);
  }
}

function waitForFirebase() {
  return new Promise(resolve => {
    if (window._db) return resolve();
    document.addEventListener('firebase-ready', resolve, { once: true });
    setTimeout(resolve, 5000); // fallback timeout
  });
}

async function saveUserRecipes(newRecipe) {
  try {
    if (!window._db) { await waitForFirebase(); }
    const docRef = await window._fsAddDoc(
      window._fsCollection(window._db, 'recipes'),
      { ...newRecipe, createdAt: window._fsTimestamp() }
    );
    // update local id to match Firestore doc id
    newRecipe.id = docRef.id;
    return true;
  } catch(e) {
    console.error('Firebase save failed:', e);
    showToast('⚠️ Errore salvataggio — controlla Firestore');
    return false;
  }
}

// COOKING MODE
function startCooking(id) {
  ckRecipe = recipes.find(x=>x.id===id); if(!ckRecipe) return;
  ckStep = 0; clearCkTimer();
  const el = document.getElementById('cooking-screen');
  el.classList.add('open');
  document.body.style.overflow = 'hidden';
  if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  renderCookStep();
  // show chat button + init chat
  document.getElementById('ck-chat-btn').classList.add('visible');
  initCkChat();
}
function closeCooking() {
  clearCkTimer();
  document.getElementById('cooking-screen').classList.remove('open');
  document.body.style.overflow = '';
  if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  document.getElementById('ck-chat-btn').classList.remove('visible');
  document.getElementById('ck-chat-panel').classList.remove('open');
}
function renderCookStep() {
  const r = ckRecipe, steps = r.steps||[], i = ckStep, s = steps[i];
  const txt = typeof s==='string'?s:s.text;
  const timer = typeof s==='string'?0:(s.timer||0);
  document.getElementById('ck-title').textContent = r.title;
  document.getElementById('ck-progress').innerHTML = steps.map((_,idx)=>`<div class="ck-dot ${idx<=i?'done':''}"></div>`).join('');
  document.getElementById('ck-step-label').textContent = `Passo ${i+1} di ${steps.length}`;
  document.getElementById('ck-ing-strip').innerHTML = (r.ingredients||[]).map(ing=>`<div class="ck-ing-pill">${ing.name} · ${ing.qty||''}</div>`).join('');
  document.getElementById('ck-num').textContent = String(i+1).padStart(2,'0');
  document.getElementById('ck-text').textContent = txt;
  clearCkTimer();
  const timerDiv = document.getElementById('ck-timer');
  if (timer > 0) { ckTimerLeft = timer; ckTimerTotal = timer; ckTimerRunning = false; renderTimerUI(timerDiv); }
  else timerDiv.innerHTML = '';
  const isLast = i === steps.length-1;
  document.getElementById('ck-nav').innerHTML =
    `${i>0?'<button class="ck-btn-prev" onclick="ckMove(-1)">← Indietro</button>':'<div></div>'}
     <button class="${isLast?'ck-btn-finish':'ck-btn-next'}" onclick="${isLast?'finishCook()':'ckMove(1)'}">${isLast?'🎉 Fatto!':'Passo successivo →'}</button>`;
}
function renderTimerUI(container) {
  container.innerHTML = `
    <div class="timer-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span class="timer-val" id="tval">${fmtTime(ckTimerLeft)}</span>
      <button class="timer-ctrl" id="tplay" onclick="toggleTimer()">${ckTimerRunning?'⏸':'▶'}</button>
      <button class="timer-ctrl timer-reset" onclick="resetTimer()">↺</button>
    </div>
    <div class="timer-done-msg" id="tdone">⏰ Tempo scaduto!</div>`;
}
function toggleTimer() {
  if (ckTimerRunning) {
    clearCkTimer(); ckTimerRunning=false;
    const b=document.getElementById('tplay'); if(b) b.textContent='▶';
  } else {
    ckTimerRunning=true;
    const b=document.getElementById('tplay'); if(b) b.textContent='⏸';
    ckInterval = setInterval(()=>{
      ckTimerLeft--;
      const v=document.getElementById('tval'); if(v) v.textContent=fmtTime(ckTimerLeft);
      if (ckTimerLeft<=0) {
        clearCkTimer(); ckTimerRunning=false;
        const d=document.getElementById('tdone'); if(d) d.classList.add('show');
        const b=document.getElementById('tplay'); if(b) b.textContent='▶';
        if(navigator.vibrate) navigator.vibrate([400,100,400,100,400]);
      }
    },1000);
  }
}
function resetTimer() {
  clearCkTimer(); ckTimerRunning=false; ckTimerLeft=ckTimerTotal;
  const v=document.getElementById('tval'); if(v) v.textContent=fmtTime(ckTimerLeft);
  const d=document.getElementById('tdone'); if(d) d.classList.remove('show');
  const b=document.getElementById('tplay'); if(b) b.textContent='▶';
}
function clearCkTimer() { if(ckInterval){clearInterval(ckInterval);ckInterval=null;} ckTimerRunning=false; }
function ckMove(dir) { clearCkTimer(); ckStep=Math.max(0,Math.min((ckRecipe.steps||[]).length-1,ckStep+dir)); renderCookStep(); }
function finishCook() { clearCkTimer(); closeCooking(); showToast('🎉 Ricetta completata! Buon appetito!'); }
function fmtTime(s) {
  if(s<=0) return '0:00';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function renderFinalPreview() {
  const title = document.getElementById('fr-title').value.trim();

  document.getElementById('final-preview').innerHTML = `

      <div style="font-weight:600;font-size:13px;margin:14px 0 8px">Passaggi (${steps.length})</div>

function collectIngredients() {
  const ings=[];
  document.querySelectorAll('[data-in]').forEach(el=>{
    const name=el.value.trim(); if(!name) return;
    const qty=(document.querySelector(`[data-iq="${el.dataset.in}"]`)||{}).value||'';
    ings.push({name,qty});
  });
  return ings;
}
function collectSteps() {
  const steps=[];
  document.querySelectorAll('[data-sn]').forEach(el=>{
    const text=el.value.trim(); if(!text) return;
    const timerEl=document.querySelector(`[data-st="${el.dataset.sn}"]`);
    const timer=timerEl&&timerEl.value?parseInt(timerEl.value)||0:0;
    steps.push({text,timer});
  });
  return steps;
}

  document.getElementById('add-phase-1').style.display='none';
  document.getElementById('add-phase-2').style.display='';
  document.getElementById('ai-loading-block').style.display='';
  document.getElementById('ai-review-fields').style.display='none';
  setAddStep(2);

  const msgs = ['Sto leggendo la ricetta…','Individuo gli ingredienti…','Struttura i passaggi…','Stimo i tempi di cottura…','Quasi pronto…'];
  let mi=0;
  const loadingMsgEl = document.getElementById('ai-loading-msg');
  const msgInterval = setInterval(()=>{ loadingMsgEl.textContent=msgs[Math.min(++mi,msgs.length-1)]; },1400);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1500,
        system:`Sei un esperto culinario per l'app Autentico. L'utente ti manda una ricetta scritta in modo informale. 
Devi strutturarla in JSON. Rispondi SOLO con JSON valido, nessun testo fuori dal JSON, nessun markdown.

Formato richiesto:
{
  "title": "nome ricetta",
  "region": "città, paese",
  "country": "uno di: Italia|Giappone|Spagna|Francia|Messico|India|Grecia|Marocco|Altro",
  "time": numero_minuti_intero,
  "description": "descrizione breve e accattivante, max 2 frasi",
  "ingredients": [{"name":"...","qty":"..."}],
  "steps": [{"text":"istruzione chiara e specifica","timer":secondi_o_0}],
  "notes": ["nota autenticità 1","nota autenticità 2"],
  "changes": ["descrizione cambiamento 1 che hai fatto","cambiamento 2"]
}

Regole:
- Sii FEDELE alla ricetta originale. Non inventare ingredienti non menzionati.
- Se mancano quantità, usa "q.b." o stima ragionevole e segnalalo nei changes.
- Dividi i passaggi in azioni singole e chiare.
- Aggiungi timer (in secondi) solo dove c'è un tempo preciso di cottura/attesa.
- Il campo "changes" deve elencare solo le aggiunte/modifiche che hai fatto rispetto al testo originale.
- Se qualcosa non è chiaro, usa il tuo giudizio culinario e segnalalo nei changes.`,
        messages:[{role:'user', content: `Struttura questa ricetta:\n\n${raw}`}]
      })
    });
    clearInterval(msgInterval);
    const data = await res.json();
    let raw2 = (data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(raw2);
    populateReviewFields(parsed, raw);
  } catch(err) {
    clearInterval(msgInterval);
    // fallback: show empty form
    populateReviewFields({}, raw);
    showToast('⚠️ IA non disponibile — compila manualmente');
  }
}

function populateReviewFields(ai, originalText) {
  document.getElementById('ai-loading-block').style.display='none';
  document.getElementById('ai-review-fields').style.display='';
  ingIdx=0; stepIdx=0;
  document.getElementById('ing-dyn-list').innerHTML='';
  document.getElementById('step-dyn-list').innerHTML='';

  const set = (id, val) => { const el=document.getElementById(id); if(el&&val!==undefined&&val!==null) el.value=val; };

  set('fr-title', ai.title||'');
  set('fr-region', ai.region||'');
  set('fr-time', ai.time||'');
  set('fr-desc', ai.description||'');
  set('fr-img', '');
  if (ai.country) {
    const sel = document.getElementById('fr-country');
    for (let opt of sel.options) { if(opt.value===ai.country){sel.value=ai.country;break;} }
  }

  // show AI badge on fields that were filled
  const fields = ['title','region','country','time','desc'];
  fields.forEach(f => {
    const rb = document.getElementById('rb-'+f);
    if (rb && ai[f==='desc'?'description':f]) {
      rb.innerHTML = '<span class="badge-ai badge-ai-changed">✦ IA</span>';
    }
  });

  // ingredients
  if (ai.ingredients && ai.ingredients.length) {
    ai.ingredients.forEach(ing => addIngRow(ing.name, ing.qty));
    const rb = document.getElementById('rb-ings');
    if (rb) rb.innerHTML = `<span class="badge-ai badge-ai-changed">✦ IA — ${ai.ingredients.length} ingredienti</span>`;
  } else { addIngRow(); addIngRow(); }

  // steps
  if (ai.steps && ai.steps.length) {
    ai.steps.forEach(s => addStepRow(s.text, s.timer||0));
    const rb = document.getElementById('rb-steps');
    if (rb) rb.innerHTML = `<span class="badge-ai badge-ai-changed">✦ IA — ${ai.steps.length} passaggi</span>`;
  } else { addStepRow(); addStepRow(); }

  // notes
  if (ai.notes && ai.notes.length) {
    set('fr-notes', ai.notes.join('\n'));
    const rb = document.getElementById('rb-notes');
    if (rb) rb.innerHTML = '<span class="badge-ai badge-ai-added">✦ IA — aggiunta</span>';
    const rs = document.getElementById('rs-notes');
    if (rs) {
      rs.style.display='';
      rs.innerHTML=`<div class="sug-label">✦ L'IA ha aggiunto note di autenticità</div>
        <div class="sug-text">${ai.notes.map(n=>'· '+n).join('<br>')}</div>
        <div class="sug-actions"><button class="sug-reject" onclick="document.getElementById('fr-notes').value='';document.getElementById('rs-notes').style.display='none'">Rimuovi</button></div>`;
    }
  }

  // changes summary
  if (ai.changes && ai.changes.length) {
    const sum = document.getElementById('ai-changes-summary');
    sum.style.display='';
    sum.innerHTML=`<div class="ai-changes-summary">
      <div class="sum-title">✦ Cosa ha fatto l'IA</div>
      <ul>${ai.changes.map(c=>`<li>${c}</li>`).join('')}</ul>
    </div>`;
  }

  document.getElementById('ai-review-subtitle').textContent = 
    'L\'IA ha strutturato la tua ricetta. Controlla ogni campo e modifica liberamente.';
}

function addIngRow(name='', qty='') {
  const i=ingIdx++;
  const div=document.createElement('div'); div.className='dyn-row'; div.id='ir'+i;
  div.innerHTML=`<input type="text" placeholder="Ingrediente" data-in="${i}" value="${name.replace(/"/g,'&quot;')}" /><input type="text" placeholder="Quantità (es: 400 g)" data-iq="${i}" value="${qty.replace(/"/g,'&quot;')}" style="max-width:140px" /><button class="rm-btn" onclick="document.getElementById('ir${i}').remove()">✕</button>`;
  document.getElementById('ing-dyn-list').appendChild(div);
}
function addStepRow(text='', timer=0) {
  const i=stepIdx++;
  const div=document.createElement('div'); div.className='step-dyn-row'; div.id='sr'+i;
  div.innerHTML=`<div class="step-num-lbl">${i+1}</div><div class="step-inner"><input type="text" placeholder="Descrivi il passaggio…" data-sn="${i}" value="${text.replace(/"/g,'&quot;')}" /><div class="step-timer-row"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>Timer (sec):</span><input type="number" placeholder="es: 300" data-st="${i}" min="0" value="${timer||''}" /></div></div><button class="step-rm" onclick="document.getElementById('sr${i}').remove()">✕</button>`;
  document.getElementById('step-dyn-list').appendChild(div);
}

function saveRecipe() {
  const title=document.getElementById('fr-title').value.trim();
  const region=document.getElementById('fr-region').value.trim();
  const country=document.getElementById('fr-country').value;
  const desc=document.getElementById('fr-desc').value.trim();
  if(!title||!region||!country){showToast('⚠️ Compila almeno nome, regione e paese');return;}
  const ingredients=collectIngredients();
  if(!ingredients.length){showToast('⚠️ Aggiungi almeno un ingrediente');return;}
  const steps=collectSteps();
  if(!steps.length){showToast('⚠️ Aggiungi almeno un passaggio');return;}
  const notes=(document.getElementById('fr-notes').value.trim()||'').split('\n').map(n=>n.trim()).filter(Boolean);
  const cover=document.getElementById('fr-img').value.trim()||'https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=800&auto=format&fit=crop';
  const newR={
    id:'u'+Date.now(), title, description:desc||title, region, country, cover,
    verified:document.getElementById('fr-verified').checked,
    author:document.getElementById('f-author').value.trim()||'Anonimo',
    likes:0, time:parseInt(document.getElementById('fr-time').value)||30,
    ingredients, steps, notes
  };
  recipes.unshift(newR);
  renderGrid(); updateStats(); closeAdd();
  showToast('⏳ Pubblicazione in corso…');
  saveUserRecipes(newR).then(ok => {
    if (ok) showToast('✓ Ricetta pubblicata e salvata!');
  });
}


// ── COOKING CHAT ──
let ckChatHistory = [];
let ckChatOpen = false;

function initCkChat() {
  ckChatHistory = [];
  const msgs = document.getElementById('ck-chat-msgs');
  msgs.innerHTML = '';
  const r = ckRecipe;
  // welcome message
  appendCkMsg('ai', `Ciao! Sono qui per aiutarti con <strong>${r.title}</strong>. Chiedimi qualsiasi cosa mentre cucini! 👨‍🍳`);
}

function toggleCkChat() {
  ckChatOpen = !ckChatOpen;
  document.getElementById('ck-chat-panel').classList.toggle('open', ckChatOpen);
  document.getElementById('ck-chat-btn').textContent = ckChatOpen ? '✕' : '💬';
  if (ckChatOpen) setTimeout(()=>document.getElementById('ck-chat-input').focus(), 300);
}

function quickAsk(q) {
  document.getElementById('ck-chat-input').value = q;
  sendCkChat();
}

function appendCkMsg(role, html, id) {
  const msgs = document.getElementById('ck-chat-msgs');
  const div = document.createElement('div');
  div.className = 'ck-msg ' + role;
  if (id) div.id = id;
  div.innerHTML = html;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendCkChat() {
  const input = document.getElementById('ck-chat-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';

  appendCkMsg('user', q);
  const typingId = 'typing-' + Date.now();
  appendCkMsg('typing', 'L'IA sta pensando…', typingId);

  ckChatHistory.push({ role: 'user', content: q });

  // build context from current step
  const r = ckRecipe;
  const step = r.steps[ckStep];
  const stepTxt = typeof step === 'string' ? step : step.text;
  const context = `Ricetta: ${r.title} (${r.region}).
Passo corrente (${ckStep+1}/${r.steps.length}): "${stepTxt}".
Ingredienti: ${(r.ingredients||[]).map(i=>i.name+' '+i.qty).join(', ')}.
Note: ${(r.notes||[]).join('; ')}.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        system: `Sei un chef esperto che assiste l'utente mentre cucina. Sei integrato nell'app Autentico.
Rispondi in italiano, in modo BREVE e PRATICO (max 3-4 frasi). Usa emoji con parsimonia.
Contesto ricetta attuale: ${context}
Adatta sempre la risposta al passo corrente della ricetta.`,
        messages: ckChatHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Non ho capito, riprova!';
    ckChatHistory.push({ role: 'assistant', content: reply });

    const typingEl = document.getElementById(typingId);
    if (typingEl) { typingEl.className = 'ck-msg ai'; typingEl.innerHTML = reply; }
    document.getElementById('ck-chat-msgs').scrollTop = 99999;
  } catch(e) {
    const typingEl = document.getElementById(typingId);
    if (typingEl) { typingEl.className = 'ck-msg ai'; typingEl.textContent = 'Errore di connessione. Riprova!'; }
  }
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetail();closeAdd();}});

loadRecipes();  // async: loads defaults first, then Firebase
</script>
